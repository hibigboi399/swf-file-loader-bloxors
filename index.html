<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxorz - Fullscreen Flash</title>
    
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <style>
        /* --- CSS SECTION --- */
    

        #game-container {
            background: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Styling for when the container is in fullscreen mode */


        /* Ensure Ruffle takes up the whole container */
        ruffle-player {
            width: 100%;
            height: 100%;
        }


       
    </style>
</head>
<body>

    <div id="game-container">
        </div>

    
    <script>
        /* --- JAVASCRIPT SECTION --- */
        window.RufflePlayer = window.RufflePlayer || {};

        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            const btn = document.getElementById("fs-button");

            container.appendChild(player);

            // IMPORTANT: Ensure "game.swf" matches your file name on GitHub exactly!
            player.load("https://hibigboi399.github.io/bloxors/bloxors.swf");

        });
    </script>
</body>
</html>
